name: tests default
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/tsemekwes
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: astral-sh/setup-uv@v7
      - uses: oven-sh/setup-bun@v2

      - name: install just
        run: sudo apt-get update -qq && sudo apt-get install -y -qq just

      - name: install tools
        run: just tools

      - name: build
        run: just py-build

      - name: test
        run: just test

      - name: bundle
        run: just bundle

      - name: py-build
        run: just py-build

      - name: py-test
        run: just py-test

name: test publish to test.pypi

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://test.pypi.org/p/tsemekwes
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: git status after checkout
        run: git status

      - uses: oven-sh/setup-bun@v2
      - uses: astral-sh/setup-uv@v7

      - name: git status after setup
        run: git status

      - name: install just
        run: sudo apt-get update -qq && sudo apt-get install -y -qq just

      - name: git status after just
        run: git status

      - name: install tools
        run: just tools

      - name: git status after tools
        run: git status

      - name: build
        run: just py-build

      - name: git status after build
        run: git status

      - name: publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          verbose: true
          print-hash: true
          skip-existing: true
